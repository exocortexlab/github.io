<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Dmitry Invariant</title>
    
    <meta name="description" content="{{ page.description | default: 'Architect of Cognitive Systems and Developer of UAI 6.0.' }}">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
        }
        body { 
            background-color: var(--bg); 
            color: #fafafa; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            transform: translateY(-5px);
        }
        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #030303 100%);
        }
        /* Стили для контента блога (Markdown) */
        .prose h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1.5rem; }
        .prose h2 { font-size: 1.8rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; color: var(--accent); }
        .prose p { margin-bottom: 1.25rem; color: #a1a1aa; line-height: 1.75; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.25rem; color: #a1a1aa; }
        .prose pre { background: #0a0a0a; padding: 1rem; border-radius: 0.75rem; border: 1px solid #27272a; overflow-x: auto; margin-bottom: 1.5rem; }
        .prose code { font-family: monospace; color: #818cf8; }
    </style>
</head>
<body class="antialiased overflow-x-hidden">

    <nav class="fixed w-full z-50 px-6 py-4 top-0">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass-card px-6 py-3 rounded-2xl">
            <div class="text-xl font-extrabold tracking-tighter">
                <a href="/">INVARIANT<span class="text-indigo-500">.INTEL</span></a>
            </div>
            <div class="hidden md:flex space-x-8 text-sm font-medium text-zinc-400">
                <a href="/#about" class="hover:text-white transition-colors">Core</a>
                <a href="/#uai" class="hover:text-white transition-colors">Exocortex</a>
                <a href="/blog" class="text-indigo-400 hover:text-white transition-colors">Blog</a>
                <a href="/#contact" class="hover:text-white transition-colors">Link</a>
            </div>
            <a href="https://linkedin.com" target="_blank" class="bg-white text-black px-4 py-2 rounded-lg text-xs font-bold hover:bg-zinc-200 transition-colors">CONNECT</a>
        </div>
    </nav>

    <div class="min-h-screen">
        {{ content }}
    </div>

    <footer class="py-20 text-center border-t border-zinc-900">
        <p class="text-zinc-600 text-sm mb-4">© 2026 Invariant Intelligence Unit</p>
        <div class="flex justify-center space-x-6 text-xs font-bold tracking-widest text-zinc-500">
            <span>STABLE</span>
            <span>AUTONOMOUS</span>
            <span>INVARIANT</span>
        </div>
    </footer>

</body>
</html>
